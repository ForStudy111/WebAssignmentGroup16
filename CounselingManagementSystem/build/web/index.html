<!DOCTYPE html>
<html>
    <head>
        <title>Counseling Booking System</title>
        <meta charset="UTF-8">
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                text-align: center;
                padding: 50px;
                background-color: #f4f7f6;
            }
            .hero {
                background: white;
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                display: inline-block;
            }
            h1 {
                color: #2c3e50;
            }
            p {
                color: #7f8c8d;
                font-size: 1.2em;
            }
            .btn {
                background-color: #3498db;
                color: white;
                padding: 15px 30px;
                text-decoration: none;
                border-radius: 5px;
                font-weight: bold;
                transition: 0.3s;
            }
            .btn:hover {
                background-color: #2980b9;
            }
        </style>
    </head>
    <body>
        <div class="hero">
            <h1>Welcome to the Counseling Portal</h1>
            <p>Your mental health matters. Book a session with our expert counselors today.</p>
            <br><br>
            <a href="login.jsp" class="btn">Enter System / Login</a>
        </div>
    </body>
</html>
